name: Asset Symbol Diagnostics

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "PCL.Mac/**"
      - "PCL.Mac.xcodeproj/**"

jobs:
  diagnose:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Icon info
        run: |
          find PCL.Mac/Assets.xcassets -type d -name "*Add*.imageset" -maxdepth 6 -print
          
          ls -la PCL.Mac/Assets.xcassets/Icons

          cat PCL.Mac/Assets.xcassets/Icons/iconAdd.imageset/Contents.json || true
          cat PCL.Mac/Assets.xcassets/Icons/IconAdd.imageset/Contents.json || true