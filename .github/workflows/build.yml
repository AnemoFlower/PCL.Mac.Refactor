name: Build App

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/**'
      - 'Configs/**'
      - 'PCL.Mac/**'
      - 'PCL.Mac.Core/**'
      - 'PCL.Mac.xcodeproj/**'
      - 'Resources/**'

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set version
        run: echo "BUILD_NUMBER=$(git rev-list --count HEAD)" >> $GITHUB_ENV

      - name: Build app
        run: |
          echo "Build number: $BUILD_NUMBER"
          xcodebuild \
            -project PCL.Mac.xcodeproj -scheme PCL.Mac -configuration Debug \
            CURRENT_PROJECT_VERSION=$BUILD_NUMBER \
            -archivePath build archive
        continue-on-error: true
      
      - name: Dump generated asset symbols
        run: |
          set -e
          DERIVED_DATA_PATH="$(mktemp -d)/DerivedData"
          xcodebuild \
            -project PCL.Mac.xcodeproj \
            -scheme PCL.Mac \
            -configuration Debug \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -showBuildSettings | tee buildsettings.txt

          echo "DerivedData: $DERIVED_DATA_PATH"
          find "$DERIVED_DATA_PATH" -maxdepth 6 -type f \( -name "*Asset*.swift" -o -name "*Generated*.swift" \) -print

          grep -R --line-number "iconAdd\\|IconAdd\\|iconUpload\\|IconUpload\\|iconBlock\\|IconBlock" "$DERIVED_DATA_PATH" || true

      # - name: Prepare app artifact directory
      #   run: |
      #     mkdir "PCL.Mac-artifact"
      #     cp -r ./build.xcarchive/Products/Applications/PCL.Mac.app ./PCL.Mac-artifact/PCL.Mac.app
      #     cp -r ./build.xcarchive ./PCL.Mac-artifact/build.xcarchive

